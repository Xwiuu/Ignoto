version: '3.8'

services:
  tor-proxy:
    image: dperson/torproxy
    container_name: ignoto-tor
    ports:
      - "9050:9050" # Porta padrão do SOCKS5
    environment:
      - TOR_ExitNodes={US} # Força a saída para não misturar com seu IP local
    networks:
      - ignoto-net

  ignoto-node:
    build:
      context: ./core-rust
      dockerfile: Dockerfile
    container_name: ignoto-node
    ports:
      - "9944:9944" # Porta RPC do Substrate
    command: ["--dev", "--tmp", "--rpc-external", "--rpc-cors=all"]
    networks:
      - ignoto-net

networks:
  ignoto-net:
    driver: bridge
